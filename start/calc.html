<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator UI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#1e1e2f;
    }

    .calculator{
      width:320px;
      background:#2c2c3e;
      padding:20px;
      border-radius:15px;
      box-shadow:0 5px 15px rgba(0,0,0,0.4);
    }

    .display{
      width:100%;
      height:70px;
      margin-bottom:20px;
      border:none;
      outline:none;
      border-radius:10px;
      padding:15px;
      font-size:28px;
      text-align:right;
      background:#f4f4f4;
      color:#000;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    button{
      height:60px;
      border:none;
      border-radius:10px;
      font-size:22px;
      cursor:pointer;
      transition:0.2s;
      background:#44445a;
      color:white;
    }

    button:hover{
      background:#5c5c78;
      transform:scale(1.05);
    }

    .operator{
      background:#ff9500;
    }

    .operator:hover{
      background:#ffad33;
    }

    .equal{
      background:#28a745;
      grid-column:span 2;
    }

    .equal:hover{
      background:#34c759;
    }

    .clear{
      background:#dc3545;
    }

    .clear:hover{
      background:#ff4d5a;
    }
  </style>
</head>

<body>

  <div class="calculator">

    <!-- Input Field -->
    <input type="text" class="display" placeholder="0">

    <!-- Buttons -->
    <div class="buttons">
      <button class="clear">C</button>
      <button>%</button>
      <button>/</button>
      <button class="operator">*</button>

      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="operator">-</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="operator">+</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="operator">.</button>

      <button>0</button>
      <button>00</button>
      <button class="equal">=</button>
    </div>

  </div>
<script src="script.js"></script>
</body>
</html>
